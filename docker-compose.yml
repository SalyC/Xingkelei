version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sinkelei_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sinkelei
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: sinkelei_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinkelei"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sinkelei_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data: